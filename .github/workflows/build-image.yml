# Image consumed by cnd-platform repo (Flux CD) for K8s deployment
name: Build and Push Container Image

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'astro.config.mjs'
      - 'Dockerfile'
      - 'nginx/**'
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      # PRs validate the build only; everything else (push, dispatch,
      # workflow_call) tags + pushes + scans.
      IS_PUBLISH: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.IS_PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Flux's ImagePolicy needs lexically sortable tags (filterTags →
          # numerical sort on the embedded timestamp). The
          # `<branch>-<sha>-<unix-ts>` pattern lets Flux pick the newest
          # deploy without semver bumps; gating on is_default_branch keeps
          # feature-branch dispatches from polluting the channel.
          tags: |
            type=sha,prefix=
            type=raw,value={{branch}}-{{sha}}-{{date 'X'}},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.IS_PUBLISH }}
          # workflow_dispatch is the "rebuild to pick up Google Sheets
          # changes" lever — without bypassing the cache, the pnpm-build
          # layer is reused and the upstream CSVs are never refetched.
          no-cache: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Run Trivy vulnerability scanner
        if: env.IS_PUBLISH == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          # Scan by digest so we hit the image this run just produced,
          # not whatever has since been promoted to :latest by another run.
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: env.IS_PUBLISH == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
